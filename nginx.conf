events {
    worker_connections 1024;
}

http {
    upstream backend {
        server pool-table-backend-jukw.onrender.com:443;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        access_log /dev/stdout;
        error_log /dev/stderr;

        # Disable redirects - handle HTTP directly
        proxy_http_version 1.1;
        proxy_set_header Host pool-table-backend-jukw.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSL settings for connecting to backend
        proxy_ssl_name pool-table-backend-jukw.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;

        # Main proxy location - forward all requests
        location / {
            proxy_pass https://backend;
            
            # Explicitly tell backend this came from HTTP client
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Forwarded-Ssl off;
        }

        # Health check endpoint (local, not forwarded)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
