events {
    worker_connections 1024;
}

http {
    # Add DNS resolver for Render
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    upstream backend {
        server pool-table-backend-jukw.onrender.com:443;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Enhanced logging for debugging
        access_log /dev/stdout;
        error_log /dev/stderr debug;  # Temporarily enable debug logging

        # Default headers sent to backend
        proxy_http_version 1.1;
        proxy_set_header Host               pool-table-backend-jukw.onrender.com;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";

        # Identify the proxy
        proxy_set_header User-Agent         "SIM900A-Proxy/1.0";

        # SSL settings for connecting to backend
        proxy_ssl_name          pool-table-backend-jukw.onrender.com;
        proxy_ssl_server_name   on;
        proxy_ssl_verify        off;
        proxy_ssl_protocols     TLSv1.2 TLSv1.3;  # Explicitly set protocols
        
        # Timeouts - increased for slower connections
        proxy_connect_timeout   60s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;
        proxy_buffering         off;

        # Retry on various errors
        proxy_next_upstream         error timeout http_429 http_502 http_503;
        proxy_next_upstream_tries   3;
        proxy_next_upstream_timeout 10s;

        # Main proxy location
        location / {
            proxy_pass https://backend;
            
            # Add error handling
            proxy_intercept_errors off;
            
            # Health check for upstream
            health_check interval=30s fails=3 passes=2;
        }

        # Local health check
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
            add_header Cache-Control "no-cache";
        }
        
        # Debug endpoint to test backend connectivity
        location /debug/backend {
            access_log off;
            return 200 "Backend: pool-table-backend-jukw.onrender.com:443\n";
            add_header Content-Type text/plain;
        }
    }
}
