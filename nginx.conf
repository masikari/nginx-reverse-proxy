events {
    worker_connections 1024;
}

http {
    upstream backend {
        server pool-table-backend-jukw.onrender.com:443;
        keepalive 32;                     # reuse connections
    }

    server {
        listen 80;
        server_name _;

        access_log /dev/stdout;
        error_log  /dev/stderr;

        # Default headers sent to backend
        proxy_http_version 1.1;
        proxy_set_header Host               pool-table-backend-jukw.onrender.com;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";          # keepalive

        # Identify the proxy so backend can whitelist it (optional)
        proxy_set_header User-Agent         "SIM900A-Proxy/1.0";

        # SSL settings for connecting to backend
        proxy_ssl_name          pool-table-backend-jukw.onrender.com;
        proxy_ssl_server_name   on;
        proxy_ssl_verify        off;                     # Render's cert is valid, but off avoids any SNI mismatch

        # Timeouts
        proxy_connect_timeout   30s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;
        proxy_buffering         off;

        # Retry on rate‑limit (429) – gives backend time to recover
        proxy_next_upstream         error timeout http_429;
        proxy_next_upstream_tries   2;
        proxy_next_upstream_timeout 10s;

        # Main proxy location – everything goes to backend
        location / {
            proxy_pass https://backend;
        }

        # Local health check – Render hits this, NOT the backend
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
