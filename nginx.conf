events {
    worker_connections 1024;
}

http {
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;
    
    gzip on;
    gzip_types application/json;
    
    server {
        listen 80;
        server_name _;
        
        # Disable all redirects
        absolute_redirect off;
        
        # Enable CORS for SIM900A
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, User-Agent, Accept, X-Requested-With' always;
        
        # Handle OPTIONS preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, User-Agent, Accept' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        
        # Health check - local response (no proxy)
        location = /health {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin' '*' always;
            return 200 '{"status":"ok"}';
        }
        
        # Payment endpoint
        location = /pay {
            # Proxy to backend but force HTTP
            proxy_pass http://pool-table-backend-jukw.onrender.com/pay;
            proxy_http_version 1.1;
            proxy_set_header Host pool-table-backend-jukw.onrender.com;
            proxy_set_header X-Forwarded-Proto http;  # Force HTTP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Don't follow redirects
            proxy_redirect off;
            proxy_redirect http:// https:// off;
            
            # Increase timeouts for SIM900A
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Allow large payloads
            client_max_body_size 10M;
            
            # Pass through CORS headers
            proxy_hide_header Access-Control-Allow-Origin;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }
        
        # Payment status endpoint
        location ~ ^/payment_status/(.*)$ {
            proxy_pass http://pool-table-backend-jukw.onrender.com/payment_status/$1;
            proxy_http_version 1.1;
            proxy_set_header Host pool-table-backend-jukw.onrender.com;
            proxy_set_header X-Forwarded-Proto http;
            proxy_redirect off;
            proxy_redirect http:// https:// off;
        }
        
        # Ping/Heartbeat endpoint
        location ~ ^/ping/(.*)$ {
            proxy_pass http://pool-table-backend-jukw.onrender.com/ping/$1;
            proxy_http_version 1.1;
            proxy_set_header Host pool-table-backend-jukw.onrender.com;
            proxy_set_header X-Forwarded-Proto http;
            proxy_redirect off;
            proxy_redirect http:// https:// off;
        }
        
        # Tamper alert endpoint
        location = /tamper_alert {
            proxy_pass http://pool-table-backend-jukw.onrender.com/tamper_alert;
            proxy_http_version 1.1;
            proxy_set_header Host pool-table-backend-jukw.onrender.com;
            proxy_set_header X-Forwarded-Proto http;
            proxy_redirect off;
            proxy_redirect http:// https:// off;
        }
        
        # Game complete endpoint
        location = /game_complete {
            proxy_pass http://pool-table-backend-jukw.onrender.com/game_complete;
            proxy_http_version 1.1;
            proxy_set_header Host pool-table-backend-jukw.onrender.com;
            proxy_set_header X-Forwarded-Proto http;
            proxy_redirect off;
            proxy_redirect http:// https:// off;
        }
        
        # Admin unlock endpoint
        location = /admin_unlock {
            proxy_pass http://pool-table-backend-jukw.onrender.com/admin_unlock;
            proxy_http_version 1.1;
            proxy_set_header Host pool-table-backend-jukw.onrender.com;
            proxy_set_header X-Forwarded-Proto http;
            proxy_redirect off;
            proxy_redirect http:// https:// off;
        }
        
        # Root endpoint
        location / {
            proxy_pass http://pool-table-backend-jukw.onrender.com/;
            proxy_http_version 1.1;
            proxy_set_header Host pool-table-backend-jukw.onrender.com;
            proxy_set_header X-Forwarded-Proto http;
            proxy_redirect off;
            proxy_redirect http:// https:// off;
        }
    }
}
