events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name _;
        
        # Disable ALL redirects
        absolute_redirect off;
        
        # Health check
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
        
        # Payment endpoint
        location = /pay {
            default_type application/json;
            return 201 '{"payment_id": 12345, "checkout_request_id": "SIM900A_TEST", "message": "STK Push sent"}';
            add_header Content-Type application/json;
        }
        
        # Payment status
        location ~ ^/payment_status/(.*)$ {
            default_type application/json;
            return 200 '{"status":"SUCCESS", "receipt":"TEST_$1"}';
        }
        
        # Ping endpoint
        location ~ ^/ping/(.*)$ {
            default_type application/json;
            return 200 '{"status":"ok", "device":"$1"}';
        }
        
        # All other endpoints
        location / {
            default_type application/json;
            return 200 '{"message":"Pool Table API","status":"ok"}';
        }
    }
}
