events {
    worker_connections 1024;
}

http {
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;
    
    gzip on;
    gzip_types application/json;
    
    server {
        listen 80;
        server_name _;
        
        absolute_redirect off;
        
        # CORS headers inside server block
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        
        # Health check
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok"}';
        }
        
        # Payment endpoint - mock response
        location = /pay {
            default_type application/json;
            return 201 '{"payment_id": 12345, "checkout_request_id": "SIM900A_TEST", "message": "STK Push sent"}';
        }
        
        # Payment status
        location ~ ^/payment_status/(.*)$ {
            default_type application/json;
            return 200 '{"status":"SUCCESS", "receipt":"RECEIPT_$1"}';
        }
        
        # Ping endpoint
        location ~ ^/ping/(.*)$ {
            default_type application/json;
            return 200 '{"status":"ok", "device":"$1"}';
        }
        
        # All other endpoints
        location / {
            default_type application/json;
            return 200 '{"message":"Welcome to the Pool Table Payment API","service":"Pool Table Backend","version":"2.0.0"}';
        }
    }
}
