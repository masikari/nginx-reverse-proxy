events {
    worker_connections 1024;
}

http {
    # DNS resolver for Render
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Enable gzip compression for faster responses
    gzip on;
    gzip_types text/plain application/json;
    gzip_min_length 100;

    upstream backend {
        # Use HTTP instead of HTTPS for SIM900A compatibility
        server pool-table-backend-jukw.onrender.com:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Logging
        access_log /dev/stdout;
        error_log /dev/stderr warn;

        # IMPORTANT: No HTTPS redirect for SIM900A
        # Disable all redirects
        proxy_redirect off;
        
        # HTTP version and headers
        proxy_http_version 1.0;  # SIM900A works better with HTTP 1.0
        proxy_set_header Connection "";
        
        # Critical headers for backend
        proxy_set_header Host               pool-table-backend-jukw.onrender.com;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  "http";  # Force HTTP, not HTTPS
        proxy_set_header User-Agent         "SIM900A-GPRS/1.0";

        # Buffer settings for SIM900A (smaller buffers are better)
        proxy_buffer_size 16k;
        proxy_buffers 2 32k;
        proxy_busy_buffers_size 32k;

        # Timeouts for SIM900A (shorter timeouts)
        proxy_connect_timeout 10s;
        proxy_send_timeout 15s;
        proxy_read_timeout 20s;
        proxy_buffering off;

        # Retry logic for failed requests
        proxy_next_upstream error timeout http_429 http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;

        # Disable all redirects
        proxy_intercept_errors off;

        # ============================================
        # MAIN PROXY LOCATION
        # ============================================
        location / {
            # Use HTTP backend directly
            proxy_pass http://backend;
            
            # No redirects for any response
            proxy_redirect http:// https:// off;
            
            # Remove any Location headers that might cause redirects
            proxy_set_header X-Redirect-Override "true";
            
            # Security headers (optional)
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ============================================
        # LOCAL ENDPOINTS (Fast responses for SIM900A)
        # ============================================
        
        # Health check for SIM900A
        location /health {
            access_log off;
            # Very simple response that SIM900A can parse easily
            return 200 "{\"status\":\"ok\"}\n";
            add_header Content-Type application/json;
            add_header Content-Length "15";
            add_header Cache-Control "no-cache";
        }
        
        # Ping endpoint for heartbeat
        location /ping/ {
            access_log off;
            # Extract device ID from path
            set $device_id $uri;
            return 200 "{\"status\":\"alive\",\"device\":\"$device_id\"}\n";
            add_header Content-Type application/json;
            add_header Cache-Control "no-cache";
        }
        
        # Payment endpoint
        location /pay {
            proxy_pass http://backend/pay;
            proxy_redirect off;
        }
        
        # Payment status endpoint
        location /payment_status/ {
            proxy_pass http://backend/payment_status/;
            proxy_redirect off;
        }
        
        # Tamper alert endpoint
        location /tamper_alert {
            proxy_pass http://backend/tamper_alert;
            proxy_redirect off;
        }
        
        # Game complete endpoint
        location /game_complete {
            proxy_pass http://backend/game_complete;
            proxy_redirect off;
        }
        
        # Admin unlock endpoint
        location /admin_unlock {
            proxy_pass http://backend/admin_unlock;
            proxy_redirect off;
        }

        # Debug endpoint for testing
        location /debug {
            access_log off;
            return 200 "SIM900A Proxy - Please use /health for testing\nBackend: pool-table-backend-jukw.onrender.com\n";
            add_header Content-Type text/plain;
        }
    }
}
