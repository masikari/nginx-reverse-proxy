events {
    worker_connections 1024;
}

http {
    # DNS resolver for Render (use Cloudflare DNS for reliability)
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Enable gzip compression for faster responses
    gzip on;
    gzip_types text/plain application/json;
    gzip_min_length 100;

    upstream backend {
        server pool-table-backend-jukw.onrender.com:443 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Logging
        access_log /dev/stdout;
        error_log /dev/stderr warn;

        # HTTP version and headers
        proxy_http_version 1.1;
        
        # Critical headers for backend
        proxy_set_header Host               pool-table-backend-jukw.onrender.com;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";
        proxy_set_header User-Agent         "SIM900A-Proxy/1.0";

        # SSL configuration for upstream
        proxy_ssl_server_name on;
        proxy_ssl_name pool-table-backend-jukw.onrender.com;
        proxy_ssl_verify off;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_session_reuse on;

        # Buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Timeouts (balanced for stability)
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
        proxy_buffering off;

        # Retry logic for failed requests
        proxy_next_upstream error timeout http_429 http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;

        # Redirect handling
        proxy_redirect off;
        proxy_intercept_errors off;

        # ============================================
        # MAIN PROXY LOCATION
        # ============================================
        location / {
            proxy_pass https://backend;
            
            # Security headers (optional but recommended)
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
        }

        # ============================================
        # LOCAL ENDPOINTS (NOT FORWARDED TO BACKEND)
        # ============================================
        
        # Health check for Render
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
            add_header Cache-Control "no-cache";
        }

        # Debug endpoint
        location /debug {
            access_log off;
            return 200 "Proxy OK\nBackend: pool-table-backend-jukw.onrender.com\n";
            add_header Content-Type text/plain;
        }
        
        # Statistics endpoint (if you need monitoring)
        location /nginx_status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }
}
