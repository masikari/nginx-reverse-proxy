events {
    worker_connections 1024;
}

http {
    # DNS resolver for Render's internal networking
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    upstream backend {
        server pool-table-backend-jukw.onrender.com:443;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        access_log /dev/stdout;
        error_log /dev/stderr;

        # Increase buffer sizes for headers
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # HTTP version and headers
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Critical: Host header must match backend exactly
        proxy_set_header Host pool-table-backend-jukw.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # User-Agent to avoid being blocked
        proxy_set_header User-Agent "nginx-reverse-proxy/1.0";

        # SSL configuration for upstream
        proxy_ssl_server_name on;
        proxy_ssl_name pool-table-backend-jukw.onrender.com;
        proxy_ssl_verify off;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_session_reuse on;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
        proxy_buffering off;

        # Disable redirects
        proxy_redirect off;

        # Main proxy location
        location / {
            proxy_pass https://backend;
            
            # Don't modify redirect responses
            proxy_redirect http:// https://;
        }

        # Health check endpoint (local response, not forwarded)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
