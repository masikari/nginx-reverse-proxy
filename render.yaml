services:
  - type: web
    name: nginx-reverse-proxy
    runtime: image
    repo: https://github.com/masikari/nginx-reverse-proxy
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    # CRITICAL: Disable HTTPS redirect
    envVars:
      - key: PORT
        value: 80
      - key: FORCE_HTTPS
        value: "false"
    # Alternative: Use HTTP-only domain
    domains:
      - type: http
